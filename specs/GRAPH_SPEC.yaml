# Kuwait Motor Adaptive Risk Engine — Canonical Graph Specification
# This is the single source of truth for graph structure.

market:
  code: KWT
  name: Kuwait
  currency: KWD
  oil_dependency: 0.85
  trade_openness: 0.40
  fiscal_buffer: 0.80
  inflation_sensitivity: 0.40
  insurance_penetration: 0.012
  regulatory_body: IRU
  primary_lines: [motor, medical, marine]

# ─── Nodes ─────────────────────────────────────────────────────
# 27 nodes across 4 categories + 5 output scores

nodes:
  # Macro (8)
  - node_key: oil_price
    label: Oil Price
    node_type: macro

  - node_key: inflation_rate
    label: Inflation Rate
    node_type: macro

  - node_key: interest_rate
    label: Interest Rate
    node_type: macro

  - node_key: credit_growth
    label: Credit Growth
    node_type: macro

  - node_key: government_spending
    label: Government Spending
    node_type: macro

  - node_key: real_estate_index
    label: Real Estate Index
    node_type: macro

  - node_key: trade_volume
    label: Trade Volume
    node_type: macro

  - node_key: fx_rate
    label: FX Rate
    node_type: macro

  # Insurance (8)
  - node_key: claims_frequency
    label: Claims Frequency
    node_type: insurance

  - node_key: claims_severity
    label: Claims Severity
    node_type: insurance

  - node_key: repair_cost_inflation
    label: Repair Cost Inflation
    node_type: insurance

  - node_key: medical_inflation
    label: Medical Inflation
    node_type: insurance

  - node_key: fraud_cluster_density
    label: Fraud Cluster Density
    node_type: insurance

  - node_key: underwriting_drift
    label: Underwriting Drift
    node_type: insurance

  - node_key: reinsurance_pressure
    label: Reinsurance Pressure
    node_type: insurance

  - node_key: premium_adequacy
    label: Premium Adequacy
    node_type: insurance

  # Portfolio (6)
  - node_key: loss_ratio
    label: Loss Ratio
    node_type: portfolio

  - node_key: policy_lapse_risk
    label: Policy Lapse Risk
    node_type: portfolio

  - node_key: suspicious_provider_concentration
    label: Suspicious Provider Concentration
    node_type: portfolio

  - node_key: high_risk_segment_growth
    label: High Risk Segment Growth
    node_type: portfolio

  - node_key: pricing_adequacy_gap
    label: Pricing Adequacy Gap
    node_type: portfolio

  - node_key: garage_network_risk
    label: Garage Network Risk
    node_type: portfolio

  # Output Score Targets (5)
  - node_key: market_stress_signal
    label: Market Stress Signal
    node_type: metric

  - node_key: claims_pressure_signal
    label: Claims Pressure Signal
    node_type: metric

  - node_key: fraud_exposure_signal
    label: Fraud Exposure Signal
    node_type: metric

  - node_key: underwriting_risk_signal
    label: Underwriting Risk Signal
    node_type: metric

  - node_key: portfolio_stability_signal
    label: Portfolio Stability Signal
    node_type: metric

