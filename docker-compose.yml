version: "3.9"

services:
  # ─── PostgreSQL Database ───────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: deevo_cortex
      POSTGRES_USER: deevo
      POSTGRES_PASSWORD: deevo_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deevo -d deevo_cortex"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://deevo:deevo_secret@db:5432/deevo_cortex"
      DATABASE_URL_SYNC: "postgresql://deevo:deevo_secret@db:5432/deevo_cortex"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      APP_ENV: "development"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ─── Next.js Frontend ─────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
